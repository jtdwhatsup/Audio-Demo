<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio Interview Practice Demo</title>
  <style>
    body {
      background: #0b0d12;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
      font-size: 15px;
    }

    .primary { background: #4f46e5; color: white; }
    .danger { background: #b91c1c; color: white; }
    .secondary { background: #1e293b; color: white; }

    audio {
      margin-top: 20px;
      width: 100%;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 20px;
      background: #11141b;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: white;
      padding: 12px;
      font-size: 14px;
      resize: none;
    }

    .section-title {
      margin-top: 30px;
      font-size: 20px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<h1>Audio Interview Practice Demo</h1>
<p>This demo records your answer, stores it, plays it back, and generates a summary with recommended improvements.</p>

<button id="startBtn" class="primary">Start Demo</button>
<button id="recordBtn" class="secondary" disabled>Start Recording</button>
<button id="stopBtn" class="danger" disabled>Stop Recording</button>

<audio id="audioPlayback" controls></audio>

<div class="section-title">Summary</div>
<textarea id="summaryBox" placeholder="Your summary will appear here..."></textarea>

<button id="downloadBtn" class="primary" disabled>Download Summary</button>

<script>
  let mediaRecorder;
  let audioChunks = [];

  const startBtn = document.getElementById("startBtn");
  const recordBtn = document.getElementById("recordBtn");
  const stopBtn = document.getElementById("stopBtn");
  const audioPlayback = document.getElementById("audioPlayback");
  const summaryBox = document.getElementById("summaryBox");
  const downloadBtn = document.getElementById("downloadBtn");

  startBtn.onclick = () => {
    startBtn.disabled = true;
    recordBtn.disabled = false;
    summaryBox.value = "Click 'Start Recording' to begin your answer.";
  };

  recordBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: "audio/mp3" });
      const audioUrl = URL.createObjectURL(audioBlob);
      audioPlayback.src = audioUrl;

      generateSummary();
      downloadBtn.disabled = false;
    };

    mediaRecorder.start();
    recordBtn.disabled = true;
    stopBtn.disabled = false;
    summaryBox.value = "Recording... speak your interview answer.";
  };

  stopBtn.onclick = () => {
    mediaRecorder.stop();
    recordBtn.disabled = false;
    stopBtn.disabled = true;
    summaryBox.value = "Processing your answer...";
  };

  function generateSummary() {
    summaryBox.value =
      "Interview Answer Summary:\n\n" +
      "- You spoke clearly and maintained a steady pace.\n" +
      "- Your answer stayed on topic and addressed the question.\n" +
      "- You demonstrated relevant experience.\n\n" +
      "Recommended Improvements:\n" +
      "- Add a specific example using the STAR method.\n" +
      "- Include a measurable result (e.g., 'improved efficiency by 20%').\n" +
      "- Keep your answer between 60–90 seconds.\n" +
      "- End with a confident closing statement.\n";
  }

  downloadBtn.onclick = () => {
    const text = summaryBox.value;
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "interview-summary.txt";
    a.click();
  };
</script>

</body>
</html>
