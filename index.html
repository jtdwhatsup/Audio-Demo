<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio Interview Practice Demo</title>
  <style>
    body {
      background: #0b0d12;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
      padding: 40px;
      max-width: 700px;
      margin: auto;
    }
    button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
      font-size: 15px;
    }
    .primary { background: #4f46e5; color: white; }
    .danger { background: #b91c1c; color: white; }
    .upload { background: #0ea5e9; color: white; }
    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      background: #11141b;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: white;
      padding: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>Audio Interview Practice Demo</h1>

<button id="recordBtn" class="primary">Start Recording</button>
<button id="stopBtn" class="danger" disabled>Stop Recording</button>
<button id="uploadBtn" class="upload">Upload Audio</button>
<input type="file" id="fileInput" accept="audio/*" style="display:none">

<audio id="player" controls></audio>

<textarea id="summary" placeholder="Summary will appear here..."></textarea>

<script>
  let recorder;
  let chunks = [];

  const recordBtn = document.getElementById("recordBtn");
  const stopBtn = document.getElementById("stopBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");
  const player = document.getElementById("player");
  const summary = document.getElementById("summary");

  // RANDOMIZED SUMMARY GENERATOR
  function generateDynamicSummary(audioURL) {
    const toneOptions = [
      "Your tone sounded steady and confident.",
      "You maintained a calm and controlled speaking pace.",
      "Your voice showed good clarity and presence.",
      "Your tone suggested a relaxed and focused mindset."
    ];

    const emotionOptions = [
      "Emotion signals suggested mild focus.",
      "Your delivery showed a balanced emotional state.",
      "You sounded calm with no major emotional spikes.",
      "Your voice reflected steady engagement."
    ];

    const engagementOptions = [
      "Engagement level appeared consistent throughout your answer.",
      "You stayed engaged without noticeable pauses.",
      "Your pacing suggested good attention and involvement.",
      "Your delivery showed consistent engagement."
    ];

    const stressOptions = [
      "No major stress indicators were detected.",
      "Your pacing did not show signs of stress.",
      "Your voice remained stable without tension.",
      "Stress levels appeared low during your response."
    ];

    const improvementOptions = [
      "Add a STAR example to strengthen your answer.",
      "Include one measurable result to make your point stronger.",
      "Try keeping your answer between 60–90 seconds.",
      "End with a confident closing line to reinforce your strengths.",
      "Add a brief example to make your answer more concrete.",
      "Consider tightening your answer for clarity."
    ];

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    return (
      "Interview Summary:\n\n" +
      "Audio File: " + audioURL + "\n\n" +
      "• " + pick(toneOptions) + "\n" +
      "• " + pick(emotionOptions) + "\n" +
      "• " + pick(engagementOptions) + "\n" +
      "• " + pick(stressOptions) + "\n\n" +
      "Recommended Improvements:\n" +
      "• " + pick(improvementOptions) + "\n" +
      "• " + pick(improvementOptions) + "\n"
    );
  }

  // RECORDING
  recordBtn.onclick = async () => {
    const unlock = document.createElement("audio");
    unlock.muted = true;
    unlock.play().then(() => unlock.remove());

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const mime = MediaRecorder.isTypeSupported("audio/webm")
      ? "audio/webm"
      : MediaRecorder.isTypeSupported("audio/mp3")
      ? "audio/mp3"
      : "audio/wav";

    recorder = new MediaRecorder(stream, { mimeType: mime });
    chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mime });
      const url = URL.createObjectURL(blob);
      player.src = url;

      summary.value = generateDynamicSummary(url);
    };

    recorder.start();
    recordBtn.disabled = true;
    stopBtn.disabled = false;
  };

  stopBtn.onclick = () => {
    recorder.stop();
    recordBtn.disabled = false;
    stopBtn.disabled = true;
  };

  // UPLOAD AUDIO
  uploadBtn.onclick = () => fileInput.click();

  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    player.src = url;

    summary.value = generateDynamicSummary(url);
  };
</script>

</body>
</html>
